services:
  product-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: product-service
    container_name: product-service
    ports:
      - "8081:8081"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFERIPADDRESS=true
      - "SPRING_DATASOURCE_URL=jdbc:mysql://product-mysql:3306/ProductServiceDatabase?allowPublicKeyRetrieval=true&useSSL=false"
      # Config repo sets spring.kafka.producer.bootstrap-servers=http://localhost:9092.
      # Override the producer sub-key (for sending) and the global key (used by
      # KafkaAdmin to create the NewTopic bean) to reach the broker container.
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_KAFKA_PRODUCER_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      product-mysql:
        condition: service_healthy
    networks:
      - microservices-net

  product-mysql:
    image: mysql:8.0
    container_name: product-mysql
    # Not published to the host (your local MySQL already owns host 3306).
    # Reachable by other containers at product-mysql:3306 on the shared network.
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=ProductServiceDatabase
    volumes:
      - product-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - microservices-net

volumes:
  product-mysql-data:

networks:
  microservices-net:
    external: true
