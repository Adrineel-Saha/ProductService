services:
  product-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: product-service
    container_name: product-service
    # Retry startup until ConfigServer is registered/reachable (handles the
    # race when everything is started together with one `docker compose up`).
    restart: on-failure
    ports:
      - "8081:8081"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFERIPADDRESS=true
      - "SPRING_DATASOURCE_URL=jdbc:mysql://product-mysql:3306/ProductServiceDatabase?allowPublicKeyRetrieval=true&useSSL=false"
      # Config repo sets spring.kafka.producer.bootstrap-servers=http://localhost:9092.
      # Override to reach the shared broker (see Kafka/docker-compose.yml, which
      # must be up first). kafka:9092 resolves over microservices-net.
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_KAFKA_PRODUCER_BOOTSTRAP_SERVERS=kafka:9092
      # Config sets logging.file.name to a C:/ path (used by Jenkins/local);
      # override to a container path written to the 'app-logs' Docker volume.
      - LOGGING_FILE_NAME=/app/logs/ProductService/ProductService-8081.log
    volumes:
      - app-logs:/app/logs
    depends_on:
      product-mysql:
        condition: service_healthy
    networks:
      - microservices-net

  product-mysql:
    image: mysql:8.0
    container_name: product-mysql
    # Not published to the host (your local MySQL already owns host 3306).
    # Reachable by other containers at product-mysql:3306 on the shared network.
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=ProductServiceDatabase
    volumes:
      - product-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - microservices-net

volumes:
  product-mysql-data:
  app-logs:

networks:
  microservices-net:
    external: true
